apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-eks-pod-identity
  namespace: ack-system
  annotations:
    description: "Wait for EKS controller pod identity association to be ready"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "1"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: wait-for-eks-pod-identity
    spec:
      restartPolicy: Never
      containers:
      - name: wait-for-pod-identity
        image: amazon/aws-cli:latest
        command:
          - /bin/bash
          - -c
          - |
            echo "Waiting for pod identity association to be available..."
            MAX_ATTEMPTS=60
            ATTEMPT=0

            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Checking for pod identity association..."

              # Check if association exists in AWS
              ASSOC_COUNT=$(aws eks list-pod-identity-associations \
                --cluster-name "{{ .Values.clusterName }}" \
                --namespace ack-system \
                --service-account ack-eks-controller \
                --query 'length(associations)' \
                --output text 2>/dev/null || echo "0")

              if [ "$ASSOC_COUNT" -gt "0" ]; then
                echo "Pod identity association found! Verifying credentials are available..."

                # Wait a bit for credentials to propagate
                sleep 10

                # Try to use the credentials (this will use the SA token if running in a pod)
                if aws sts get-caller-identity > /dev/null 2>&1; then
                  echo "Credentials are working!"
                  aws sts get-caller-identity
                  echo "Pod identity association is ready for use!"
                  exit 0
                else
                  echo "Association exists but credentials not yet available, waiting..."
                fi
              else
                echo "Association not yet created, waiting 5 seconds..."
              fi

              sleep 5
            done

            echo "ERROR: Pod identity association not ready after $MAX_ATTEMPTS attempts"
            exit 1
        env:
          - name: AWS_DEFAULT_REGION
            value: {{ .Values.awsRegion | quote }}
      serviceAccountName: default
  backoffLimit: 3
