kind: GitRepo
apiVersion: fleet.cattle.io/v1alpha1
metadata:
  name: ack-controllers
  namespace: fleet-default
spec:
  # Repository URL - update this to your actual repository URL
  repo: https://github.com/ravan/mcm-eks-fleet-blueprints

  # Branch to track
  branch: main

  # Paths to monitor in the repository
  # Each path will become a separate bundle with proper dependencies
  paths:
    - blueprints/fleet-bootstrap-ack-eks
    - blueprints/ack-eks-controller
    - blueprints/ack-iam-controller

  # Polling interval - how often Fleet checks for changes
  pollingInterval: 60s

  # NOTE: Targets are NOT defined here to allow each bundle's fleet.yaml
  # to define its own targetCustomizations with cluster-specific Helm values.
  # When targets are defined at GitRepo level, Fleet ignores bundle-level
  # targetCustomizations, preventing cluster-specific value injection.
