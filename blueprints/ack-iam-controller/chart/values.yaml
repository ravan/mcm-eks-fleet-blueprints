# Values for the wrapper chart
clusterName: "placeholder"
awsRegion: "us-east-1"
awsAccountId: "000000000000"
ackIamRoleName: "placeholder"

# Values passed to the iam-chart subchart
iam-chart:
  # Service account configuration (no IRSA annotation for Pod Identity)
  serviceAccount:
    create: true
    name: ack-iam-controller
    annotations: {}

  # AWS region configuration
  aws:
    region: "us-east-1"  # Default, overridden by Fleet

  # Init container to wait for pod identity credentials
  deployment:
    initContainers:
      - name: wait-for-pod-identity
        image: amazon/aws-cli:latest
        command:
          - /bin/bash
          - -c
          - |
            set -e
            echo "Waiting for pod identity credentials to be available..."
            MAX_ATTEMPTS=30
            ATTEMPT=0
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              if aws sts get-caller-identity > /dev/null 2>&1; then
                echo "Pod identity credentials are available!"
                exit 0
              fi
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Credentials not ready yet, waiting 2 seconds..."
              sleep 2
            done
            echo "ERROR: Pod identity credentials did not become available after $MAX_ATTEMPTS attempts"
            exit 1
